<script>
(function () {
  const COUNTER_API = "https://api.countapi.xyz";
  const visitCounter = document.getElementById("visit-counter");
  const courseLinks = Array.from(document.querySelectorAll("[data-course-key]"));
  const clickDisplays = Array.from(document.querySelectorAll("[data-click-display]"));

  function makeNamespace() {
    // Si estás en file:// hostname es vacío -> usamos un nombre fijo.
    const host = window.location.hostname || "local-scanmatic";
    // Ojo: en algunos hosts window.location.pathname puede ser largo; igual lo normaliza.
    const path = window.location.pathname || "/index.html";
    return (host + path)
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "")
      .slice(0, 60); // evita namespaces demasiado largos
  }

  const namespace = makeNamespace();

  async function apiGet(url) {
    const res = await fetch(url, { method: "GET", cache: "no-store", mode: "cors" });
    return res;
  }

  async function ensureCounter(key) {
    // Si no existe, la creamos en 0 (evita 404 repetidos y “cero fantasma”).
    const getRes = await apiGet(`${COUNTER_API}/get/${namespace}/${key}`);
    if (getRes.status === 404) {
      // create: namespace + key + value
      await apiGet(`${COUNTER_API}/create?namespace=${encodeURIComponent(namespace)}&key=${encodeURIComponent(key)}&value=0`);
      return { value: 0 };
    }
    if (!getRes.ok) throw new Error("Counter GET failed");
    return await getRes.json();
  }

  async function hitCounter(key) {
    // hit normalmente crea si no existe, pero aseguramos consistencia
    await ensureCounter(key);
    const res = await apiGet(`${COUNTER_API}/hit/${namespace}/${key}`);
    if (!res.ok) throw new Error("Counter HIT failed");
    return await res.json();
  }

  function formatNumber(value) {
    return new Intl.NumberFormat("es-PE").format(Number(value) || 0);
  }

  function setVisitValue(value) {
    if (!visitCounter) return;
    visitCounter.textContent = formatNumber(value);
    visitCounter.classList.remove("is-loading");
  }

  function setClickValue(key, value) {
    const strong = document.querySelector(`[data-click-display="${key}"] strong`);
    if (!strong) return;
    strong.textContent = formatNumber(value);
    strong.parentElement.classList.remove("is-loading");
  }

  function getDisplayedClickValue(key) {
    const strong = document.querySelector(`[data-click-display="${key}"] strong`);
    if (!strong) return 0;
    const n = Number(String(strong.textContent).replace(/[^\d]/g, ""));
    return Number.isFinite(n) ? n : 0;
  }

  async function loadVisitCounter() {
    try {
      const data = await hitCounter("visitas");
      setVisitValue(data.value ?? 0);
    } catch (e) {
      // Si esto te queda en 0, abre consola para ver el error real
      console.error("VISIT COUNTER ERROR:", e);
      setVisitValue(0);
    }
  }

  async function loadClickCounters() {
    await Promise.all(clickDisplays.map(async (display) => {
      const key = display.getAttribute("data-click-display");
      try {
        const data = await ensureCounter("click-" + key);
        setClickValue(key, data.value ?? 0);
      } catch (e) {
        console.error("CLICK COUNTER LOAD ERROR:", key, e);
        setClickValue(key, 0);
      }
    }));
  }

  // Interceptamos el click para asegurar que el HIT se ejecute ANTES de abrir el link.
  courseLinks.forEach((link) => {
    link.addEventListener("click", async (event) => {
      event.preventDefault();

      const key = link.getAttribute("data-course-key");
      const url = link.href;

      // UI optimista
      const currentValue = getDisplayedClickValue(key);
      setClickValue(key, currentValue + 1);

      try {
        const data = await hitCounter("click-" + key);
        setClickValue(key, data.value ?? (currentValue + 1));
      } catch (e) {
        console.error("CLICK HIT ERROR:", key, e);
        // revert si quieres (opcional):
        // setClickValue(key, currentValue);
      }

      // Abrimos después de contar (más confiable en móvil)
      window.open(url, "_blank", "noopener,noreferrer");
    }, { passive: false });
  });

  // IMPORTANTE: si pruebas en file://, usa un servidor http local.
  loadVisitCounter();
  loadClickCounters();
})();
</script>
